<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCMS Home — Civic Clarity Reference</title>
  <style>
    :root { --primary: #0d9488; --bg: #f8fafc; --card: #fff; --text: #0f172a; --muted: #64748b; }
  </style>
</head>
<body style="margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text)">
  <nav style="background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;justify-content:space-between;align-items:center">
    <strong style="color:var(--primary)">SCMS</strong>
    <div style="display:flex;gap:16px;font-size:14px">
      <a href="#" style="color:var(--muted);text-decoration:none">Login</a>
      <a href="#" style="background:var(--primary);color:#fff;padding:8px 16px;border-radius:12px;text-decoration:none">Register</a>
    </div>
  </nav>
  <main style="max-width:960px;margin:0 auto;padding:32px 16px">
    <section style="background:linear-gradient(135deg,#f0fdfa,#ecfdf5);border:1px solid #e2e8f0;border-radius:24px;overflow:hidden;margin-bottom:48px">
      <div style="padding:48px">
        <span style="background:rgba(13,148,136,.1);color:var(--primary);font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px">Civic Services Portal</span>
        <h1 style="font-size:2.5rem;margin:16px 0">Smart City Management System</h1>
        <p style="color:var(--muted);font-size:1.125rem;max-width:28rem">Report urban service issues and help improve your community.</p>
        <div style="margin-top:24px;display:flex;gap:12px">
          <a href="#" style="background:var(--primary);color:#fff;padding:12px 32px;border-radius:12px;text-decoration:none;font-weight:500">Get Started</a>
          <a href="#" style="border:1px solid #cbd5e1;padding:12px 32px;border-radius:12px;text-decoration:none;color:var(--text)">Login</a>
        </div>
      </div>
    </section>
    <h2 style="text-align:center;font-size:1.5rem">Service Categories</h2>
    <p style="text-align:center;color:var(--muted);margin-bottom:24px">6 category cards in 2×3 grid (mobile: 2 col)</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      <div style="background:var(--card);border:1px solid #e2e8f0;border-top:4px solid #64748b;border-radius:16px;padding:24px;text-align:center">Air Pollution</div>
      <div style="background:var(--card);border:1px solid #e2e8f0;border-top:4px solid #f59e0b;border-radius:16px;padding:24px;text-align:center">Electricity</div>
      <div style="background:var(--card);border:1px solid #e2e8f0;border-top:4px solid #f97316;border-radius:16px;padding:24px;text-align:center">Road</div>
      <div style="background:var(--card);border:1px solid #e2e8f0;border-top:4px solid #06b6d4;border-radius:16px;padding:24px;text-align:center">Sewage</div>
      <div style="background:var(--card);border:1px solid #e2e8f0;border-top:4px solid #10b981;border-radius:16px;padding:24px;text-align:center">Waste</div>
      <div style="background:var(--card);border:1px solid #e2e8f0;border-top:4px solid #8b5cf6;border-radius:16px;padding:24px;text-align:center">Others</div>
    </div>
  </main>
</body>
</html>
