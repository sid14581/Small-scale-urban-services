{% extends 'base_layout.html' %}
{% load static %}

{% block title %}Submit Feedback - SCMGS{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <div class="glass-panel">
        <h2 style="text-align: center; margin-bottom: 0.5rem; font-size: 2rem;">User Feedback</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem;">
            Help us improve our city services. Share your thoughts or suggestions below.
        </p>

        <form method="post" action="/feedback">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Problem Category / Area</label>
                {{ form.problem }}
            </div>

            <div class="form-group">
                <label class="form-label">Detailed Comments</label>
                {{ form.comment }}
            </div>

            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Submit Feedback</button>
                <button type="reset" class="btn btn-outline">Reset</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
