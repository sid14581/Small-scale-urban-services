{% extends 'base_layout.html' %}
{% load static %}

{% block title %}Citizen Login - SCMGS{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 3rem auto;">
    <div class="glass-panel">
        <h2 style="text-align: center; margin-bottom: 0.5rem; font-size: 2rem;">Log In</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem;">
            Access your citizen dashboard to file complaints.
        </p>

        <form action="/third" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="id_username">Username</label>
                <input type="text" id="id_username" name="username" class="form-control" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label class="form-label" for="id_password">Password</label>
                <input type="password" id="id_password" name="password" class="form-control" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Log In</button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <span style="color: var(--text-secondary);">Don't have an account? </span>
            <a href="/second">Register here &rarr;</a>
        </div>
        
        <div style="margin-top: 1rem; text-align: center; font-size: 0.85rem;">
            <a href="/E_third" style="color: var(--text-muted);">Are you an employee? Portal Access &rarr;</a>
        </div>
    </div>
</div>
{% endblock %}
