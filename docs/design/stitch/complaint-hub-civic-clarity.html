<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCMS Complaint Hub — Civic Clarity Reference</title>
</head>
<body style="margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#0f172a">
  <main style="max-width:960px;margin:0 auto;padding:48px 16px">
    <h1 style="font-size:2rem;margin:0">File a Complaint</h1>
    <p style="color:#64748b;margin:8px 0 40px">Select a category to submit your complaint.</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px">
      <!-- 6 clickable category cards with top accent border + image + CTA -->
      <a href="#" style="background:#fff;border:1px solid #e2e8f0;border-top:4px solid #10b981;border-radius:16px;padding:24px;text-align:center;text-decoration:none;color:inherit">
        <div style="width:80px;height:80px;background:#e2e8f0;border-radius:12px;margin:0 auto 16px"></div>
        <strong>Waste Management</strong>
        <p style="color:#0d9488;font-size:14px;margin:8px 0 0">Submit complaint →</p>
      </a>
    </div>
    <hr style="margin:48px 0;border:none;border-top:1px solid #e2e8f0" />
    <h2 style="font-size:1.25rem">Submit form (single category)</h2>
    <div style="max-width:480px;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px">
      <p style="font-size:14px;color:#64748b">Labeled fields: description, phone, address, area, optional Drive link</p>
    </div>
  </main>
</body>
</html>
