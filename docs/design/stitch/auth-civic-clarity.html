<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCMS Auth — Civic Clarity Reference</title>
</head>
<body style="margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#0f172a">
  <main style="max-width:896px;margin:0 auto;padding:48px 16px;display:grid;grid-template-columns:1fr 1fr;gap:32px">
    <div style="background:linear-gradient(135deg,#f0fdfa,#ecfdf5);border:1px solid #e2e8f0;border-radius:24px;padding:32px;display:flex;align-items:center;justify-content:center;min-height:320px">
      <p style="color:#64748b;text-align:center">Hero image + welcome message</p>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;box-shadow:0 1px 3px rgb(15 23 42 / 8%)">
      <h2 style="margin:0 0 8px">Login</h2>
      <p style="color:#64748b;font-size:14px;margin:0 0 24px">Sign in, then verify via SMS OTP</p>
      <input placeholder="Username" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:12px;margin-bottom:12px;box-sizing:border-box" />
      <input type="password" placeholder="Password" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:12px;margin-bottom:16px;box-sizing:border-box" />
      <button style="width:100%;background:#0d9488;color:#fff;border:none;padding:12px;border-radius:12px;font-weight:500;cursor:pointer">Continue</button>
      <p style="text-align:center;font-size:14px;color:#64748b;margin-top:24px">Step 2: OTP input (centered, wide tracking)</p>
    </div>
  </main>
</body>
</html>
