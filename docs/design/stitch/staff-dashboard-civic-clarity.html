<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCMS Staff Dashboard — Civic Clarity Reference</title>
</head>
<body style="margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#0f172a">
  <main style="max-width:960px;margin:0 auto;padding:48px 16px">
    <span style="background:#ccfbf1;color:#0f766e;font-size:12px;padding:4px 10px;border-radius:999px">Staff Portal</span>
    <h1 style="font-size:2rem;margin:12px 0 8px">Staff Dashboard</h1>
    <p style="color:#64748b;margin:0 0 32px">Overview of complaint volume and status.</p>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px">
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;text-align:center">
        <div style="font-size:2rem;font-weight:700;color:#0d9488">42</div>
        <div style="font-size:14px;color:#64748b">Total</div>
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;text-align:center">
        <div style="font-size:2rem;font-weight:700;color:#d97706">12</div>
        <div style="font-size:14px;color:#64748b">Open</div>
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;text-align:center">
        <div style="font-size:2rem;font-weight:700;color:#0284c7">8</div>
        <div style="font-size:14px;color:#64748b">In Progress</div>
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;text-align:center">
        <div style="font-size:2rem;font-weight:700;color:#059669">22</div>
        <div style="font-size:14px;color:#64748b">Resolved</div>
      </div>
    </div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px">
      <h2 style="margin:0 0 16px;font-size:1rem">By Category</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <a href="#" style="display:flex;justify-content:space-between;padding:12px;border-radius:12px;text-decoration:none;color:inherit">Road Construction <span style="color:#0d9488;font-weight:600">15</span></a>
      </div>
    </div>
  </main>
</body>
</html>
