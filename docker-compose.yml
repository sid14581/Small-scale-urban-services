services:
  db:
    image: mysql:8.0
    container_name: scms_db
    env_file: .env
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-flush-log-at-trx-commit=2 --max-allowed-packet=64M
    environment:
      MYSQL_DATABASE: ${DB_NAME:-projectDB}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot --silent && mysql -uroot -e 'SELECT 1' projectDB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: scms_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scms_backend
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      GUNICORN_RELOAD: "1"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_AUTH_BYPASS: ${VITE_AUTH_BYPASS:-off}
    container_name: scms_frontend
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: scms_nginx
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql_data:
